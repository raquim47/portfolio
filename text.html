<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    :root {
      --pink: #fff;
      --purple: #8e23a3;
    }

    /* var(--pink): #ff70a4 var(--purple): #0c020e  */

    body {
      height: 100vh;
      /* background: var(--pink); */
      
    }

    .wrap {
      transform: scale(.9);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      perspective: 600px;
    }


    #checkerboard {
      position: absolute;
      bottom: -30%;
      right: -60%;
      height: 150%;
      width: 200%;
      transform: rotateX(90deg);
      transform-origin: center center;
      transform-style: preserve-3d;
      background-color: var(--pink);
      background-size: 100px 100px;
      background-position: 0 0, 50px 50px;
      background-image: linear-gradient(45deg, var(--purple) 25%, transparent 25%, transparent 75%, var(--purple) 75%, var(--purple)),
        linear-gradient(45deg, var(--purple) 25%, transparent 25%, transparent 75%, var(--purple) 75%, var(--purple));
      animation: move-background 3s linear infinite
    }

    /* #checkerboard:after {
      content: '';
      display: block;
      height: 100%;
      width: 100%;
      background-image: linear-gradient(var(--pink), transparent);
    } */

    /* 'fog' */
    /* @keyframes move-background {
      to {
        background-position: 0 100px,
          50px 150px
      }
    } */
  </style>
</head>

<body>
  <div class="wrap"><div id="checkerboard"></div></div>
</body>

</html>
