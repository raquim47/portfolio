<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://webfontworld.github.io/gmarket/GmarketSans.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      height: 10000px;
      width: 100%;
      /* perspective: 1000px; */
    }

    .fixed {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 100%;
      /* perspective: 1000px; */
      background-color: #000;
      transform-style: preserve-3d;
    }

    .circle {
      position: absolute;
      top: 100%;
      left: 50%;
      border: 3px solid rgb(255, 255, 255);
      border-radius: 50%;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%) rotateZ(60deg);
      opacity: .4;
    }

    .s1 {
      width: 18.5vw;
      height: 18.5vw;
    }

    .s2 {
      width: 17vw;
      height: 17vw;
    }

    .s3 {
      width: 15.5vw;
      height: 15.5vw;

    }

    .s4 {
      width: 14vw;
      height: 14vw;
    }

    .s5 {
      width: 12.5vw;
      height: 12.5vw;
    }

    .s6 {
      width: 11vw;
      height: 11vw;
    }

    .s7 {
      width: 9.5vw;
      height: 9.5vw;
    }

    .s8 {
      width: 8vw;
      height: 8vw;
    }

    .left {
      position: fixed;
      left: 0;
      top: 0;
      width: 50%;
      height: 100vh;
      background-color: #000;
    }

    .right {
      position: fixed;
      right: 0;
      top: 0;
      width: 50%;
      height: 100vh;
      background-color: #000;
    }

    :root {
      --pink: #fff;
      --purple: #000;
    }

    .wrap {
      transform: scale(.01);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      perspective: 600px;
    }

    #checkerboard {
      position: absolute;
      bottom: -30%;
      right: -60%;
      height: 150%;
      width: 200%;
      transform: rotateX(90deg);
      transform-origin: center center;
      transform-style: preserve-3d;
      background-color: var(--pink);
      background-size: 100px 100px;
      background-position: 0 0px, 50px 50px;
      background-image: linear-gradient(45deg, var(--purple) 25%, transparent 25%, transparent 75%, var(--purple) 75%, var(--purple)),
        linear-gradient(45deg, var(--purple) 25%, transparent 25%, transparent 75%, var(--purple) 75%, var(--purple));
        transition: all .5s;
      animation: move-background 3s linear infinite
    }
    /* @keyframes move-background {
      to {
        background-position: 0 100px,
          50px 150px
      }
    } */
    .tit {
      font-family: 'GmarketSans';
      font-weight: 500;
      letter-spacing: -2px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12vw;
      color: rgba(255, 255, 255, 0.9);
    }
    .box {
      width: 90vw;
      height: 90vh;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #000;
      border: 5px solid #fff;
      border-radius: 20px;
      opacity: .9;
    }
  </style>
</head>

<body>
  <div class="fixed">
    <div class="wrap" data-2500="transform:scale(0)" data-3500="transform:scale(1)"><div id="checkerboard" data-2500="background-position: 0 0, 50px 50px" data-4000="background-position: 0 100px, 50px 150px"></div></div>
    <h3 class="tit" data-3500="font-size:0vw; color: rgba(255, 255, 255, 0)" data-5000="font-size:10vw; color: rgba(255, 255, 255, 1)" data-6000="font-size:25vw; color: rgba(255, 255, 255, 0)">FRONTEND</h3>
    <div class="box" data-6000="width:0vw; height:0vh; opacity:0" data-9000="width:90vw; height:90vh; opacity:.8"></div>
    <div class="circle s1"
      data-0="top:100%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(0deg) scale(1); opacity:0;"
      data-300="top:50%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-1000="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-2000="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(5); opacity:0"></div>
    <div class="circle s2"
      data-100="top:100%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(0deg) scale(1); opacity:0;"
      data-400="top:50%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-1100="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-2100="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(5); opacity:0"></div>
    <div class="circle s3"
      data-200="top:100%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(0deg) scale(1); opacity:0;"
      data-500="top:50%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-1200="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-2200="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(5); opacity:0"></div>
    <div class="circle s4"
      data-300="top:100%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(0deg) scale(1); opacity:0;"
      data-600="top:50%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-1300="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-2300="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(5); opacity:0"></div>
    <div class="circle s5"
      data-400="top:100%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(0deg) scale(1); opacity:0;"
      data-700="top:50%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-1400="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-2400="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(5); opacity:0"></div>
    <div class="circle s6"
      data-500="top:100%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(0deg) scale(1); opacity:0;"
      data-800="top:50%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-1500="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-2500="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(5); opacity:0"></div>
    <div class="circle s7"
      data-600="top:100%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(0deg) scale(1); opacity:0;"
      data-900="top:50%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-1600="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-2600="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(5); opacity:0"></div>
    <div class="circle s8"
      data-700="top:100%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(0deg) scale(1); opacity:0;"
      data-1000="top:50%; transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-1700="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(1); opacity:1"
      data-2700="transform: translate(-50%, -50%) rotateZ(60deg) rotateY(360deg) scale(5); opacity:0"></div>
  </div>

  <script src="js/skrollr.js"></script>
  <script>
    // 스크롤러 실행
    const s = skrollr.init({
      smoothScrolling: true,
      scale: 1
    });

    const wrap = document.querySelector('.wrap');
    const checkerboard = document.querySelector('#checkerboard');

    window.addEventListener('scroll', function(){
      let scrollTop = window.scrollY;
      
      if(scrollTop>2500 && scrollTop <9000){
        let move = (scrollTop - 2500) / 2;
        checkerboard.style.backgroundPosition = `0 ${move}px, 50px ${50+move}px`
      }
    });
  </script>
</body>

</html>
