<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .flip-outer {
      width: 300px;
      height: 300px;
    }

    .flip-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transition: all 1s;
      transform-style: preserve-3d;
    }

    .flip-inner:hover {
      transform: rotateY(180deg);
    }

    .front {
      background: url(img/profile.png) center center;
      background-size: cover;
      width: 100%;
      height: 100%;
      position: absolute;
      z-index: 1;
      backface-visibility: hidden;
    }

    .back {
      width: 100%;
      position: absolute;
      transform: rotateY(180deg);
    }
  </style>
</head>

<body>
  <div class="flip-outer">
    <div class="flip-inner">
      <div class="front"></div>
      <div class="back">
        <h4>개발자 김철용</h4>
        <p>Frontend Developer</p>
      </div>
    </div>
  </div>
</body>

</html>
