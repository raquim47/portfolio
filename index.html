<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">

  <title>Document</title>
</head>

<body>
  <!-- logo -->
  <a href="#" class="logo">
    <span class="logo__mouth">
    </span>
  </a>

  <section class="intro">
    <h1 class="intro__tit">
      <div>PORTFOLIO</div>
      <div>SEONGJIN</div>
    </h1>
    <div class="intro__img">
      <img src="img/intro.png" alt="intro-img">
    </div>
  </section>

  <script src="https://kit.fontawesome.com/0d80c14f2f.js" crossorigin="anonymous"></script>
  <!-- <script src="js/gsap.min.js"></script> -->
  
  <script>
    document.querySelectorAll('.intro__tit > div').forEach(el => {
      let splitIntroTit = el.innerText.split('').join('</span><span aria-hidden="true">');
      splitIntroTit = '<span aria-hidden="true">' + splitIntroTit + '</span>';
      el.innerHTML = splitIntroTit;
    });

    window.addEventListener('scroll', () => {
      let scrollTop = window.scrollY;

      // 인트로 텍스트 한 글자씩 위로 이동
      const titleRow1 = document.querySelectorAll('.intro__tit > div:nth-child(1) span');
      const titleRow2 = document.querySelectorAll('.intro__tit > div:nth-child(2) span');

      if (scrollTop < 660) {
        for (let i = titleRow1.length - 1; i >= 0; i--) {
          titleRow1[i].style.transform = `translateY(-${scrollTop*((i/4+1))}px)`;
        };
        for (let i = titleRow2.length - 1; i >= 0; i--) {
          titleRow2[i].style.transform = `translateY(-${scrollTop*((i/4+1))}px)`;
        };
      }
      // 인트로 이미지 커지다가 너비가 100vw 되면 위로 이동
      const titleImg = document.querySelector('.intro__img');
      const titleImgOffset = titleImg.offsetWidth;

      if (scrollTop < 580) {
        titleImg.style.marginBottom = `-${scrollTop}px`;
        titleImg.style.width = `${(scrollTop*8/58)+20}vw`;
        titleImg.style.right = `${(scrollTop*-5/580)+5}vw`;
      } else if (scrollTop > 580) {
        titleImg.style.transform = `translateY(-${scrollTop-580}px)`;
      }


    });
  </script>
</body>


</html>
