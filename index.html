  <script src="https://kit.fontawesome.com/0d80c14f2f.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>
  <script>
    document.querySelectorAll('.intro__tit > div').forEach(el => {
      let splitIntroTit = el.innerText.split('').join('</span><span aria-hidden="true">');
      splitIntroTit = '<span aria-hidden="true">' + splitIntroTit + '</span>';
      el.innerHTML = splitIntroTit;
    });

    window.addEventListener('scroll', () => {
      let scrollTop = window.scrollY;

      // 인트로 텍스트 한 글자씩 위로 이동
      if (scrollTop < 660) {
        // 너무 빨리올라가서 문장 전체는 스크롤만큼 내려줌
        document.querySelector('.intro__tit div:nth-child(1)').style.transform = `translateY(${scrollTop}px)`;
        document.querySelector('.intro__tit > div:nth-child(2)').style.transform = `translateY(${scrollTop}px)`;

        // 첫번째 줄의 개별 글자
        const titleRow1 = document.querySelectorAll('.intro__tit > div:nth-child(1) span');
        for (let i = titleRow1.length - 1; i >= 0; i--) {
          titleRow1[i].style.transform = `translateY(-${scrollTop*((i/4+1))}px)`;
        };
        // 두번째 줄의 개별 글자
        const titleRow2 = document.querySelectorAll('.intro__tit > div:nth-child(2) span');
        for (let i = titleRow2.length - 1; i >= 0; i--) {
          titleRow2[i].style.transform = `translateY(-${scrollTop*((i/4+1))}px)`;
        };
      }
      // 인트로 이미지 커지다가 너비가 100vw 되면 위로 이동
      const titleImg = document.querySelector('.intro__img');
      const titleImgOffset = titleImg.offsetWidth;

      if (scrollTop < 580) {
        // 커지면서
        titleImg.style.width = `${(scrollTop*8/58)+20}vw`;
        // 위에 잘리지 않게 위치는 내리고
        titleImg.style.marginBottom = `-${scrollTop*2}px`;
        // 좌우 꽉 차게 오른쪽여백 줄이기
        titleImg.style.right = `${(scrollTop*-5/580)+5}vw`;
      } else if (scrollTop > 580) {
        titleImg.style.transform = `translateY(-${scrollTop-580}px)`;
      }


    });
  </script>
  <script>
    // 가로모드
    function scroll(){
      let scrollTop = window.scrollY;
      const intro2 = document.querySelector('.intro2')
      let offsetIntro2 = scrollTop - intro2.offsetTop;
      if(scrollTop >= intro2.offsetTop){
        gsap.to('.intro2__inner', {
          left: -offsetIntro2,
          ease: 'linear'
        });
      }
      requestAnimationFrame(scroll);
    }
    scroll();
    // 선 그려지는 애니메이션
    const container = document.querySelector('.intro2');

    const path = document.querySelector('.intro2__svgline');

    const pathLength = path.getTotalLength();
    
    path.style.strokeDasharray = pathLength + ' ' + pathLength;
    path.style.strokeDashoffset = pathLength;

    function calcDashoffset(scrollY, element, length) {
      const ratio = (scrollY - element.offsetTop) / element.offsetHeight
      const value = length - (length * ratio)
      return value < 0 ? 0 : value > length ? length : value
    }

    function scrollHandler() {
      const scrollY = window.scrollY + (window.innerHeight*0.8)
      
      path.style.strokeDashoffset = calcDashoffset(scrollY, container, pathLength)
    }

    window.addEventListener('scroll', scrollHandler)
  </script>
